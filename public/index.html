<html lang="de">
<head>

  <link rel="stylesheet" href="vendor/bpmn-js/diagram-js.css">

  <style>
    @font-face {
      font-family: "Inter";
      src: url("/assets/fonts/inter-regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Inter";
      src: url("/assets/fonts/inter-medium.woff2") format("woff2");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Inter";
      src: url("/assets/fonts/inter-semibold.woff2") format("woff2");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --teal: #0e97ad;
      --sky: #0284c7;
      --light: #b0cfe5;
      --navy: #2a314d;
      --deep: #0B162A;
      --bg: #eef4fa;
      --bg-2: #ffffff;
      --bg-3: #e2ecf5;
      --text: #0f1c2e;
      --text-muted: #4e6680;
      --border: rgba(14, 97, 150, 0.13);
      --glow: rgba(14, 151, 173, 0.13);
      --accent: #0a7d94;
      --accent-2: var(--sky);
      --input-bg: #f5f9fd;
      --shadow: 0 4px 24px rgba(14, 60, 120, 0.10);
      --shadow-sm: 0 2px 10px rgba(14, 60, 120, 0.08);
      --grid-color: rgba(14, 97, 173, 0.045);
      --header-height: 56px;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    body {
      position: relative;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    a, button, input {
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 18px 18px;
      gap: 18px;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 16px;
      background: transparent;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      flex-shrink: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .brand-home {
      display: inline-flex;
      align-items: baseline;
      opacity: 1;
    }

    .brand-home:hover { opacity: 0.7; }
    .brand-dark { color: var(--text); font-weight: 800; }
    .brand-accent { color: var(--sky); font-weight: 800; }

    .brand-separator {
      margin: 0 8px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .brand-current {
      display: inline-flex;
      align-items: baseline;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .brand-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      flex: 1;
      min-width: 0;
    }

    .editor-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex: 1;
      min-width: 0;
      flex-wrap: wrap;
    }

    .mode-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 16px;
      flex-wrap: wrap;
    }

    .mode-toggle .btn {
      white-space: nowrap;
    }

    .mode-toggle .btn.is-active {
      background: var(--accent-2);
      color: #fff;
      border: none;
      box-shadow: 0 1px 2px rgba(2, 132, 199, 0.15), 0 2px 4px rgba(2, 132, 199, 0.12);
    }

    .mode-toggle .btn.is-active:hover {
      background: #0369a1;
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(2, 132, 199, 0.18), 0 4px 12px rgba(2, 132, 199, 0.20);
    }

    .mode-toggle .btn.is-active:active {
      transform: translateY(0);
      box-shadow: 0 1px 2px rgba(2, 132, 199, 0.20);
    }

    .mode-toggle .btn:disabled {
      opacity: 0.72;
      cursor: wait;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 32px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 500;
      background: transparent;
      color: var(--text);
      transition: all 0.15s ease;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      flex-shrink: 0;
    }

    .btn-primary {
      background: var(--accent-2);
      color: #fff;
      border: none;
      box-shadow: 0 1px 2px rgba(2, 132, 199, 0.15), 0 2px 4px rgba(2, 132, 199, 0.12);
    }

    .btn-primary:hover {
      background: #0369a1;
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(2, 132, 199, 0.18), 0 4px 12px rgba(2, 132, 199, 0.20);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 1px 2px rgba(2, 132, 199, 0.20);
    }

    .btn-secondary {
      background: #ffffff;
      border-color: transparent;
      color: var(--text);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
    }

    .btn-secondary svg {
      color: var(--text-muted);
    }

    .btn-secondary:hover {
      background: #ffffff;
      color: var(--text);
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(15, 23, 42, 0.06), 0 4px 8px rgba(15, 23, 42, 0.08);
    }

    .btn-secondary:hover svg {
      color: var(--accent);
    }

    .btn-secondary:active {
      transform: translateY(0);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    }

    .btn-ghost {
      color: var(--text-muted);
      border-color: transparent;
      background: transparent;
    }

    .btn-ghost:hover { color: var(--teal); }

    .header-logo {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      opacity: 1;
      transition: opacity 0.2s ease;
    }

    .header-logo:hover {
      opacity: 0.7;
    }

    .header-logo img {
      display: block;
      height: 32px;
      width: auto;
    }

    .app-main {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #canvas {
      position: relative;
      z-index: 2;
      flex: 1;
      min-height: calc(100vh - 160px);
      margin: 16px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(14, 60, 120, 0.10);
    }

    #canvas .djs-container,
    #canvas .djs-palette,
    #canvas .djs-popup,
    #canvas .djs-context-pad {
      font-family: "Inter", system-ui, sans-serif;
    }

    #canvas .djs-container { background: #ffffff; }

    #canvas .djs-palette {
      margin-top: 12px;
      margin-left: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      background: #ffffff;
    }

    #canvas .djs-palette .entry:hover,
    #canvas .djs-palette .highlighted-entry {
      background: rgba(14, 165, 233, 0.08);
    }

    #canvas .djs-palette .separator { border-color: var(--border); }

    #canvas .djs-context-pad,
    #canvas .djs-popup {
      background: #ffffff;
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
    }

    #canvas .djs-popup .entry:hover,
    #canvas .djs-context-pad .entry:hover {
      background: rgba(14, 165, 233, 0.08);
    }

    #toast-container {
      position: fixed;
      top: calc(var(--header-height) + 20px);
      right: 28px;
      z-index: 40;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      min-width: 280px;
      max-width: min(360px, calc(100vw - 32px));
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13.5px;
      border: 1px solid transparent;
      box-shadow: var(--shadow-sm);
      background: rgba(14, 165, 233, 0.08);
      color: var(--text);
      opacity: 0;
      transform: translateY(-8px);
      animation: toast-in 0.2s ease forwards;
    }

    .toast[data-type="info"] { border-color: rgba(14, 165, 233, 0.24); }

    .toast[data-type="error"] {
      background: rgba(220, 38, 38, 0.08);
      border-color: rgba(220, 38, 38, 0.24);
      color: #dc2626;
    }

    .toast.is-leaving { animation: toast-out 0.2s ease forwards; }

    .site-footer {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      padding: 4px 4px 0;
      color: var(--text-muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
    }

    .footer-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .footer-group a:hover { color: var(--teal); }
    .footer-label { color: var(--text); font-weight: 500; }
    .footer-author { color: var(--text-muted); justify-content: center; }
    .footer-author a { color: var(--text-muted); }
    .footer-author a:hover { color: var(--sky); }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toast-out {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-8px); }
    }

    @media (max-width: 920px) {
      .site-header {
        height: auto;
        min-height: var(--header-height);
        padding-top: 10px;
        padding-bottom: 10px;
        flex-wrap: wrap;
      }

      .brand-tools {
        width: 100%;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .editor-tools {
        justify-content: flex-start;
        width: 100%;
      }

      .mode-toggle {
        margin-right: 12px;
      }

      .site-footer { flex-direction: column; }
    }

    @media (max-width: 640px) {
      .app-shell {
        padding: 0 12px 14px;
        gap: 14px;
      }

      .brand { font-size: 17px; }
      .editor-tools {
        gap: 10px;
      }
      .mode-toggle {
        margin-right: 0;
      }
      .toolbar {
        width: 100%;
        justify-content: flex-start;
      }
      .toolbar-group { gap: 6px; }
      .btn { padding: 6px 10px; }
      .btn-label { display: none; }
      #canvas { min-height: calc(100vh - 188px); }
      .header-logo img { height: 26px; }

      #toast-container {
        right: 12px;
        left: 12px;
        top: calc(var(--header-height) + 52px);
      }

      .toast {
        max-width: none;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <h1 class="visually-hidden">BPMNDesk – Kostenloser BPMN 2.0 Editor zum Erstellen und Herunterladen von Prozessdiagrammen direkt im Browser</h1>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand" aria-label="DESKsuite BPMNDesk">
        <a class="brand-home" href="https://desk-suite.wissen-und-werkzeug.de/">
          <span class="brand-dark">DESK</span><span class="brand-accent">suite</span>
        </a>
        <span class="brand-separator">›</span>
        <span class="brand-current"><span class="brand-dark">BPMN</span><span class="brand-accent">Desk</span></span>
      </div>

      <div class="brand-tools">
        <div class="editor-tools">
          <div class="mode-toggle" role="group" aria-label="BPMN-Symbolumfang">
            <button class="btn btn-secondary mode-toggle-button" id="mode-easy" type="button" data-mode="easy" aria-pressed="false">Easy Peasy</button>
            <button class="btn btn-secondary mode-toggle-button" id="mode-basis" type="button" data-mode="basis" aria-pressed="true">Basis-Level</button>
            <button class="btn btn-secondary mode-toggle-button" id="mode-vollstaendig" type="button" data-mode="vollstaendig" aria-pressed="false">Vollständig</button>
          </div>
          <div class="toolbar">
            <div class="toolbar-group" aria-label="Werkzeugleiste">
              <button class="btn btn-secondary" id="new-diagram" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
                <span class="btn-label">Neu</span>
              </button>
              <button class="btn btn-secondary" id="open-diagram" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V5"></path><path d="M7 10l5-5 5 5"></path><path d="M5 19h14"></path></svg>
                <span class="btn-label">Öffnen</span>
              </button>
              <button class="btn btn-primary" id="download-bpmn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v11"></path><path d="M7 12l5 5 5-5"></path><path d="M5 19h14"></path></svg>
                <span class="btn-label">Herunterladen</span>
              </button>
              <button class="btn btn-secondary" id="download-svg" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="2"></rect><circle cx="9" cy="10" r="1.5"></circle><path d="M20 15l-4.5-4.5L8 18"></path></svg>
                <span class="btn-label">Als SVG</span>
              </button>
            </div>
          </div>
        </div>
        <a class="header-logo" href="https://wissen-und-werkzeug.de" target="_blank" rel="noopener">
          <img src="assets/images/logo-wuw.png" alt="Wissen &amp; Werkzeug — Beratung für Prozessmanagement und KI">
        </a>
      </div>
    </header>

    <main class="app-main">
      <div id="canvas" aria-label="BPMN-Arbeitsbereich"></div>
    </main>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <footer class="site-footer">
      <div class="footer-group">
        <span class="footer-label">Rechtliches</span>
        <a href="https://wissen-und-werkzeug.de/impressum/" target="_blank" rel="noopener">Impressum</a>
        <a href="/datenschutz.html">Datenschutz</a>
      </div>
      <div class="footer-group footer-author">
        <span>Erstellt durch <a href="https://wissen-und-werkzeug.de/ueber_mich/" target="_blank" rel="noopener">Patrick Roßkothen</a></span>
      </div>
      <div class="footer-group">
        <span class="footer-label">BPMN lernen?</span>
        <a href="https://wissen-und-werkzeug.de/seminare/" target="_blank" rel="noopener">→ Grundkurs BPMN</a>
      </div>
    </footer>
  </div>

  <input id="file-input" type="file" accept=".bpmn,.xml" hidden>

  <script src="vendor/bpmn-js/bpmn-modeler.production.min.js"></script>
  <script>
    const START_DIAGRAM_XML = `<?xml version="1.0" encoding="UTF-8"?>
<bpmn:definitions xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL"
  xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI"
  xmlns:dc="http://www.omg.org/spec/DD/20100524/DC"
  xmlns:di="http://www.omg.org/spec/DD/20100524/DI"
  id="Definitions_1"
  targetNamespace="https://bpmn.wissen-und-werkzeug.de/schema/bpmndesk">
  <bpmn:process id="Process_1" isExecutable="false">
    <bpmn:startEvent id="StartEvent_1" name="Start" />
  </bpmn:process>
  <bpmndi:BPMNDiagram id="BPMNDiagram_1">
    <bpmndi:BPMNPlane id="BPMNPlane_1" bpmnElement="Process_1">
      <bpmndi:BPMNShape id="StartEvent_1_di" bpmnElement="StartEvent_1">
        <dc:Bounds x="180" y="180" width="36" height="36" />
      </bpmndi:BPMNShape>
    </bpmndi:BPMNPlane>
  </bpmndi:BPMNDiagram>
</bpmn:definitions>`;

    const toastContainer = document.getElementById("toast-container");
    const fileInput = document.getElementById("file-input");
    const canvasContainer = document.getElementById("canvas");
    const modeButtons = Array.from(document.querySelectorAll(".mode-toggle-button"));
    const DEFAULT_MODE = "basis";

    const EASY_PEASY_PALETTE_ENTRIES = [
      { key: "hand-tool", group: "tools", className: "bpmn-icon-hand-tool", title: "Hand-Tool", toolAction: "hand" },
      { key: "lasso-tool", group: "tools", className: "bpmn-icon-lasso-tool", title: "Lasso-Tool", toolAction: "lasso" },
      { key: "space-tool", group: "tools", className: "bpmn-icon-space-tool", title: "Space-Tool", toolAction: "space" },
      { key: "global-connect-tool", group: "tools", className: "bpmn-icon-connection-multi", title: "Connect-Tool", toolAction: "connect" },
      { key: "tool-separator", separator: true, group: "tools" },
      { key: "create.start-event", group: "event", className: "bpmn-icon-start-event-none", title: "Start-Event", type: "bpmn:StartEvent" },
      { key: "create.end-event", group: "event", className: "bpmn-icon-end-event-none", title: "End-Event", type: "bpmn:EndEvent" },
      { key: "create.task", group: "activity", className: "bpmn-icon-task", title: "Task", type: "bpmn:Task" },
      { key: "create.exclusive-gateway", group: "gateway", className: "bpmn-icon-gateway-xor", title: "Exklusives Gateway", type: "bpmn:ExclusiveGateway" },
      { key: "create.parallel-gateway", group: "gateway", className: "bpmn-icon-gateway-parallel", title: "Paralleles Gateway", type: "bpmn:ParallelGateway" },
      { key: "create.participant-expanded", group: "collaboration", className: "bpmn-icon-participant", title: "Pool mit Lane", type: "bpmn:Participant", participantKind: "expanded" },
      { key: "create.participant-empty", group: "collaboration", className: "bpmn-icon-participant", title: "Black-Box-Pool", type: "bpmn:Participant", participantKind: "empty" }
    ];

    const BASIS_PALETTE_ENTRIES = [
      { key: "hand-tool", group: "tools", className: "bpmn-icon-hand-tool", title: "Hand-Tool", toolAction: "hand" },
      { key: "lasso-tool", group: "tools", className: "bpmn-icon-lasso-tool", title: "Lasso-Tool", toolAction: "lasso" },
      { key: "space-tool", group: "tools", className: "bpmn-icon-space-tool", title: "Space-Tool", toolAction: "space" },
      { key: "global-connect-tool", group: "tools", className: "bpmn-icon-connection-multi", title: "Connect-Tool", toolAction: "connect" },
      { key: "tool-separator", separator: true, group: "tools" },

      if (element.businessObject.$type !== "bpmn:Participant") {

    function popupDescriptorKey(type, variant) {

    function inferPopupDescriptor(entryId, entry) {

      if (/(group|annotation|text-annotation|complex-gateway|inclusive-gateway|gateway-or|compensation|signal|error|escalation|cancel|multiple|parallel-multiple|terminate|link|receive-task|user-task|service-task|manual-task|script-task|business-rule|call-activity|send-task)/.test(haystack)) {
        return "__blocked__";
      }

      if (/subprocess-expanded/.test(haystack)) {
        return "__blocked__";
      }

      if (/subprocess-collapsed/.test(haystack)) {
        return "bpmn:SubProcess|collapsed";
      }

      if (/data-object/.test(haystack)) {
        return "bpmn:DataObjectReference";
      }

      if (/data-store/.test(haystack)) {
        return "bpmn:DataStoreReference";
      }

      if (/participant|pool/.test(haystack)) {
        return "bpmn:Participant";
      }

      if (/message-flow/.test(haystack)) {
        return "bpmn:MessageFlow";
      }

      if (/sequence-flow/.test(haystack)) {
        return "bpmn:SequenceFlow";
      }

      if (/gateway-eventbased/.test(haystack)) {
        return "bpmn:EventBasedGateway";
      }

      if (/gateway-parallel/.test(haystack)) {
        return "bpmn:ParallelGateway";
      }

      if (/gateway-xor|exclusive-gateway/.test(haystack)) {
        return "bpmn:ExclusiveGateway";
      }

      if (/start-event-message/.test(haystack)) {
        return popupDescriptorKey("bpmn:StartEvent", "bpmn:MessageEventDefinition");
      }

      if (/start-event-timer/.test(haystack)) {
        return popupDescriptorKey("bpmn:StartEvent", "bpmn:TimerEventDefinition");
      }

      if (/start-event-condition/.test(haystack)) {
        return popupDescriptorKey("bpmn:StartEvent", "bpmn:ConditionalEventDefinition");
      }

      if (/start-event-none|create\.start/.test(haystack)) {

        return popupDescriptorKey("bpmn:IntermediateCatchEvent", "bpmn:MessageEventDefinition");
      }

      if (/intermediate-event-catch-timer|timer-intermediate-event/.test(haystack)) {
        return popupDescriptorKey("bpmn:IntermediateCatchEvent", "bpmn:TimerEventDefinition");

      if (/intermediate-event-catch-condition|condition-intermediate-event/.test(haystack)) {

    function observePopupDom(canvas, mode) {

          const descriptor = inferPopupDescriptor(node.getAttribute("data-action") || node.getAttribute("data-id") || `popup-${index}`, {
            className: `${node.className} ${node.querySelector("[class*='bpmn-icon-']")?.className || ""}`,
            label: node.textContent || "",
            title: node.getAttribute("title") || node.getAttribute("aria-label") || ""

          node.style.display = isAllowed ? "" : "none";

      observer.observe(container, { childList: true, subtree: true });

    function createPaletteProviderModule(mode) {

      function BpmndeskPaletteProvider(palette, create, elementFactory, bpmnFactory, handTool, lassoTool, spaceTool, globalConnect) {
        this._create = create;
        this._elementFactory = elementFactory;
        this._bpmnFactory = bpmnFactory;

          connect: (event) => this._globalConnect.start(event)
        };

        return Object.fromEntries(paletteEntries.map((descriptor) => {
          if (descriptor.separator) {
            return [descriptor.key, { group: descriptor.group, separator: true }];
          }

          if (descriptor.toolAction) {
            return [descriptor.key, { group: descriptor.group, className: descriptor.className, title: descriptor.title, action: { click: actions[descriptor.toolAction] } }];
          }

          const createShape = createShapeFactory(this._elementFactory, this._bpmnFactory, descriptor);
          const startCreate = (event) => this._create.start(event, createShape());
          return [descriptor.key, { group: descriptor.group, className: descriptor.className, title: descriptor.title, action: { dragstart: startCreate, click: startCreate } }];
        }));

    function createContextPadProviderModule(mode) {
      function BpmndeskContextPadProvider(contextPad, create, elementFactory, bpmnFactory, connect, modeling, injector) {
        this._create = create;
        this._elementFactory = elementFactory;
        this._bpmnFactory = bpmnFactory;
        this._connect = connect;
        this._modeling = modeling;
        this._autoPlace = injector.get("autoPlace", false);
        this._mode = mode;
        contextPad.registerProvider(this);

      BpmndeskContextPadProvider.$inject = ["contextPad", "create", "elementFactory", "bpmnFactory", "connect", "modeling", "injector"];

      BpmndeskContextPadProvider.prototype.getContextPadEntries = function getContextPadEntries(element) {
        const entries = {
          delete: {
            group: "edit",
            className: "bpmn-icon-trash",
            title: "Löschen",
            action: { click: () => this._modeling.removeElements([element]) }
          }

        if (!isConnection(element) && !isLabel(element)) {
          entries.connect = {
            group: "connect",
            className: "bpmn-icon-connection-multi",
            title: "Verbindung ziehen",
            action: {
              click: (event) => this._connect.start(event, element),
              dragstart: (event) => this._connect.start(event, element)
            }
          };
        }

        if (isLaneHostElement(element)) {
          const getLaneTarget = () => getParticipantLaneTarget(element);
          const addLane = (location) => () => {
            const target = getLaneTarget();

            if (target && typeof this._modeling.addLane === "function") {
              this._modeling.addLane(target, location);
            }
          };
          const splitLane = () => {
            const target = getLaneTarget();

            if (target && typeof this._modeling.splitLane === "function") {
              this._modeling.splitLane(target, 2);
            }
          };

          entries["lane-insert-above"] = {
            group: "lane-insert-above",
            className: "bpmn-icon-lane-insert-above",
            title: "Lane oberhalb einfügen",
            action: { click: addLane("top") }
          };

          entries["lane-divide-two"] = {
            group: "lane-divide",
            className: "bpmn-icon-lane-divide-two",
            title: "In zwei Lanes teilen",
            action: { click: splitLane }
          };

          entries["lane-insert-below"] = {
            group: "lane-insert-below",
            className: "bpmn-icon-lane-insert-below",
            title: "Lane unterhalb einfügen",
            action: { click: addLane("bottom") }
          };
        }

        if (!canAppendFrom(element)) {
          return entries;
        }

        MODE_RULES[this._mode].appendDescriptors.forEach((descriptor) => {
          const createShape = createShapeFactory(this._elementFactory, this._bpmnFactory, descriptor);
          const appendShape = (event) => {
            const shape = createShape();
            if (this._autoPlace) {
              this._autoPlace.append(element, shape);
              return;
            }
            this._create.start(event, shape, { source: element });
          };

          entries[descriptor.key] = {
            group: "append",
            className: descriptor.className,
            title: descriptor.title,
            action: { click: appendShape, dragstart: appendShape }
          };
        });

        return entries;
      };

      BpmndeskContextPadProvider.prototype.getMultiElementContextPadEntries = function getMultiElementContextPadEntries() {
        return {};
      };

      return { __init__: ["contextPadProvider"], contextPadProvider: ["type", BpmndeskContextPadProvider] };
    }

    function createPopupFilterModule(mode) {

      BpmndeskPopupFilter.$inject = ["canvas"];

    }

    const easyPeasyModules = [createPaletteProviderModule("easy"), createContextPadProviderModule("easy"), createPopupFilterModule("easy")];
    const basisModules = [createPaletteProviderModule("basis"), createContextPadProviderModule("basis"), createPopupFilterModule("basis")];
    const vollstaendigModules = [];

    function getModulesForMode(mode) {
      if (mode === "easy") {
        return easyPeasyModules;
      }

      if (mode === "vollstaendig") {
        return vollstaendigModules;
      }

      return basisModules;

    let currentModeler = null;
    let currentMode = DEFAULT_MODE;
    let isSwitchingMode = false;

    function showToast(message, type = "info") {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.dataset.type = type;
      toast.textContent = message;
      toastContainer.appendChild(toast);

      window.setTimeout(() => {
        toast.classList.add("is-leaving");
        window.setTimeout(() => toast.remove(), 220);
      }, 5000);
    }

    function downloadBlob(content, type, filename) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function createModeler(mode) {
      return new BpmnJS({
        container: "#canvas",
        additionalModules: getModulesForMode(mode)
      });
    }

    async function importDiagram(xml) {
      await currentModeler.importXML(xml);
      currentModeler.get("canvas").zoom("fit-viewport");
    }

    function updateModeButtons() {
      modeButtons.forEach((button) => {
        const isActive = button.dataset.mode === currentMode;
        button.classList.toggle("is-active", isActive);
        button.classList.toggle("btn-primary", isActive);
        button.classList.toggle("btn-secondary", !isActive);
        button.setAttribute("aria-pressed", String(isActive));
        button.disabled = isSwitchingMode;
      });
    }

    async function createOrReplaceModeler(mode, xml) {
      if (currentModeler) {
        currentModeler.destroy();
      }

      canvasContainer.innerHTML = "";
      currentModeler = createModeler(mode);
      currentMode = mode;
      updateModeButtons();
      await importDiagram(xml);
    }

    async function switchMode(nextMode) {
      if (nextMode === currentMode || isSwitchingMode) {
        return;
      }

      isSwitchingMode = true;
      updateModeButtons();

      try {
        const { xml } = await currentModeler.saveXML({ format: true });
        await createOrReplaceModeler(nextMode, xml);
      } catch (error) {
        console.error(error);
        showToast("Modus konnte nicht gewechselt werden.", "error");
      } finally {
        isSwitchingMode = false;
        updateModeButtons();
      }
    }

    // Startzustand des Editors: minimales, gepinntes BPMN-XML mit einem Start-Event.
    async function loadStartDiagram() {
      try {
        if (!currentModeler) {
          await createOrReplaceModeler(currentMode, START_DIAGRAM_XML);
          return;
        }

        await importDiagram(START_DIAGRAM_XML);
      } catch (error) {
        console.error(error);
        showToast("Startdiagramm konnte nicht geladen werden.", "error");
      }
    }

    document.getElementById("new-diagram").addEventListener("click", async () => {
      if (!window.confirm("Aktuelles Diagramm verwerfen und neu starten?")) {
        return;
      }

      await loadStartDiagram();
      showToast("Neues Diagramm wurde geladen.");
    });

    document.getElementById("open-diagram").addEventListener("click", () => {
      fileInput.value = "";
      fileInput.click();
    });

    // Datei-Import bleibt rein lokal im Browser und verwendet FileReader.
    fileInput.addEventListener("change", () => {
      const [file] = fileInput.files || [];
      if (!file) {
        return;
      }

      const reader = new FileReader();

      reader.onload = async () => {
        try {
          await importDiagram(String(reader.result || ""));
          showToast("Diagramm wurde geladen.");
        } catch (error) {
          console.error(error);
          showToast("Datei konnte nicht geladen werden. Bitte prüfen Sie, ob es sich um eine gültige BPMN-2.0-Datei handelt.", "error");
        }
      };

      reader.onerror = () => {
        showToast("Datei konnte nicht gelesen werden.", "error");
      };

      reader.readAsText(file);
    });

    document.getElementById("download-bpmn").addEventListener("click", async () => {
      try {
        const result = await currentModeler.saveXML({ format: true });
        downloadBlob(result.xml, "application/xml;charset=utf-8", "diagramm.bpmn");
      } catch (error) {
        console.error(error);
        showToast("Diagramm konnte nicht heruntergeladen werden.", "error");
      }
    });

    document.getElementById("download-svg").addEventListener("click", async () => {
      try {
        const result = await currentModeler.saveSVG();
        downloadBlob(result.svg, "image/svg+xml;charset=utf-8", "diagramm.svg");
      } catch (error) {
        console.error(error);
        showToast("SVG konnte nicht heruntergeladen werden.", "error");
      }
    });

    modeButtons.forEach((button) => {
      button.addEventListener("click", async () => {
        await switchMode(button.dataset.mode);
      });
    });

    window.addEventListener("resize", () => {
      const canvas = currentModeler && currentModeler.get("canvas");
      if (canvas) {
        canvas.resized();
